<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script src="./dist/browser.js"></script>
    <script>
      const a = app.createField({
        text: 'sdf\n234234\nsdfsdf,234234,sdfg\nsdf\n234 234\nsdf sdf,234 234,sdfg\nsdf\n234 234\nsdf sdf,OTHER,other,234 234,sd fg',
      });

      document.body.append(a.element);
    </script>
    <style>
      .field {
        cursor: text;
        position: relative;
        user-select: none;
      }
      .cursor {
        background: black;
        min-width: 2px;
        z-index: 50;
      }
      .v-input-demo {
        box-sizing: border-box;
        padding: 4px 8px;
      }
      .active .v-input-demo {
        border: 2px solid #404040;
        box-sizing: border-box;
        padding: 2px 6px;
      }
      .canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      .rows {
        position: relative;
        z-index: 20;
      }
      .back-canvas {
        z-index: 10;
      }
      .front-canvas {
        pointer-events: none;
        z-index: 30;
      }
    </style>
  </body>
</html>
